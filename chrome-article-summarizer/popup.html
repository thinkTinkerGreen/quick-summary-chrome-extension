<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      width: 200px;
      padding: 1rem;
      background: #0f172a;
      color: white;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }

    button {
      background: linear-gradient(to right, #38bdf8, #818cf8);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      width: 100%;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: block;
      color: #38bdf8;
    }
  </style>
</head>

<body>
  <span class="logo">Quick Summary</span>
  <button id="toggle">Open Quick Summary</button>
  <button id="options">Settings</button>
  <script src="popup.js"></script>
</body>

</html>
